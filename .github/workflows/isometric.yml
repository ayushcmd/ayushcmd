name: Generate Isometric
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ayushcmd
          outputs: 
             dist/isometric.svg?action=tetris-3d&theme=tokyonight
            
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
