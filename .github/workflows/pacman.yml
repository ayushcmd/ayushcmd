name: Generate Contribution Graphs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pac-Man Contribution Graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ayushcmd
          outputs: |
            dist/pacman-contribution-grid.svg?color_snake=yellow&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&pac=true
            dist/pacman-contribution-grid-dark.svg?color_snake=yellow&color_dots=#1C1917,#2d4a1e,#3d7a2a,#4ea83a,#62d346&pac=true

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
